map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    # TODO: Замените nataliagorlach.kz на ваш актуальный домен проекта
    server_name nataliagorlach.kz www.nataliagorlach.kz;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $frontend_upstream frontend:3000;

    if ($host = www.nataliagorlach.kz) {
        return 301 http://nataliagorlach.kz$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://$frontend_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Кеширование изображений и других файлов из public
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2)$ {
        proxy_pass http://$frontend_upstream;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    client_max_body_size 10M;
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}

# HTTPS block — uncomment after obtaining SSL certificate
server {
    listen 443 ssl;
    http2 on;
    # TODO: Замените nataliagorlach.kz на ваш актуальный домен проекта
    server_name nataliagorlach.kz www.nataliagorlach.kz;

    ssl_certificate /etc/letsencrypt/live/nataliagorlach.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nataliagorlach.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
