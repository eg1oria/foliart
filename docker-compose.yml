#
# Default deployment expects nginx on the host and uses nginx.system.conf.
# If you want nginx inside Docker, run with: docker compose --profile container-proxy up -d --build
#
networks:
  dev:

services:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: rolli
  #     POSTGRES_PASSWORD: rolli_secret
  #     POSTGRES_DB: rolli
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   expose:
  #     - '5432'
  #   networks:
  #     - dev
  #   restart: unless-stopped

  nginx:
    image: nginx:alpine
    profiles:
      - container-proxy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/conf.d/default.conf'
      - '/etc/letsencrypt:/etc/letsencrypt:ro'
      - 'certbot_www:/var/www/certbot:ro'
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - dev
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles:
      - container-proxy
    volumes:
      - '/etc/letsencrypt:/etc/letsencrypt'
      - '/var/lib/letsencrypt:/var/lib/letsencrypt'
      - 'certbot_www:/var/www/certbot'
    networks:
      - dev

  backend:
    build:
      context: ./backend
      args:
        DATABASE_URL: file:/app/data/prod.db
        ADMIN_API_SECRET: 'foliart-admin-api-secret-2026'
    expose:
      - '5000'
    ports:
      - '127.0.0.1:5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/data/prod.db
      - FRONTEND_URL=https://foliart.me,https://www.foliart.me
      - ADMIN_API_SECRET=foliart-admin-api-secret-2026
    volumes:
      - backend_data:/app/data
      - ./backend/images:/app/images
    networks:
      - dev
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5000/api').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_URL: http://backend:5000
        SITE_URL: https://foliart.me
        NEXT_PUBLIC_SITE_URL: https://foliart.me
        ADMIN_USERNAME: admin
        ADMIN_PASSWORD: 'Foliart2026!'
        ADMIN_SESSION_SECRET: 'foliart-admin-session-secret-2026'
        ADMIN_API_SECRET: 'foliart-admin-api-secret-2026'
    expose:
      - '3000'
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://backend:5000
      - SITE_URL=https://foliart.me
      - NEXT_PUBLIC_SITE_URL=https://foliart.me
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=Foliart2026!
      - ADMIN_SESSION_SECRET=foliart-admin-session-secret-2026
      - ADMIN_API_SECRET=foliart-admin-api-secret-2026
    volumes:
      - frontend_next_cache:/app/.next/cache
    networks:
      - dev
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/ru/catalog').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  # backend_uploads:
  # postgres_data:
  backend_data:
  frontend_next_cache:
  certbot_www:
