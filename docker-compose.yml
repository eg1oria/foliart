networks:
  dev:

services:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: rolli
  #     POSTGRES_PASSWORD: rolli_secret
  #     POSTGRES_DB: rolli
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   expose:
  #     - '5432'
  #   networks:
  #     - dev
  #   restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/conf.d/default.conf'
      - '/etc/letsencrypt:/etc/letsencrypt:ro'
      - 'certbot_www:/var/www/certbot:ro'
    depends_on:
      - backend
      - frontend
    networks:
      - dev
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - '/etc/letsencrypt:/etc/letsencrypt'
      - '/var/lib/letsencrypt:/var/lib/letsencrypt'
      - 'certbot_www:/var/www/certbot'
    networks:
      - dev

  backend:
    build:
      context: ./backend
      args:
        DATABASE_URL: file:/app/data/prod.db
        ADMIN_API_SECRET: 'foliart-admin-api-secret-2026'
    expose:
      - '5000'
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/data/prod.db
      - FRONTEND_URL=https://nataliagorlach.kz,https://www.nataliagorlach.kz
      - ADMIN_API_SECRET=foliart-admin-api-secret-2026
    volumes:
      - backend_data:/app/data
      - ./backend/images:/app/images
    networks:
      - dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_URL: http://backend:5000
        SITE_URL: https://nataliagorlach.kz
        NEXT_PUBLIC_SITE_URL: https://nataliagorlach.kz
        NEXT_PUBLIC_CDN_URL: ''
        NEXT_PUBLIC_ENABLE_PUBLIC_ASSET_CDN: 'false'
        ASSET_PREFIX: ''
        ENABLE_ASSET_PREFIX: 'false'
        ENABLE_IMAGE_CDN: 'false'
        ADMIN_USERNAME: admin
        ADMIN_PASSWORD: 'Foliart2026!'
        ADMIN_SESSION_SECRET: 'foliart-admin-session-secret-2026'
        ADMIN_API_SECRET: 'foliart-admin-api-secret-2026'
    expose:
      - '3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://backend:5000
      - SITE_URL=https://nataliagorlach.kz
      - NEXT_PUBLIC_SITE_URL=https://nataliagorlach.kz
      - NEXT_PUBLIC_CDN_URL=
      - NEXT_PUBLIC_ENABLE_PUBLIC_ASSET_CDN=false
      - ASSET_PREFIX=
      - ENABLE_ASSET_PREFIX=false
      - ENABLE_IMAGE_CDN=false
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=Foliart2026!
      - ADMIN_SESSION_SECRET=foliart-admin-session-secret-2026
      - ADMIN_API_SECRET=foliart-admin-api-secret-2026
    networks:
      - dev
    restart: unless-stopped

volumes:
  # backend_uploads:
  # postgres_data:
  backend_data:
  certbot_www:
