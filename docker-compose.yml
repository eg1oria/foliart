networks:
  dev:

services:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: rolli
  #     POSTGRES_PASSWORD: rolli_secret
  #     POSTGRES_DB: rolli
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   expose:
  #     - '5432'
  #   networks:
  #     - dev
  #   restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/conf.d/default.conf'
      - '/etc/letsencrypt:/etc/letsencrypt:ro'
      - 'certbot_www:/var/www/certbot:ro'
    depends_on:
      - backend
      - frontend
    networks:
      - dev
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - '/etc/letsencrypt:/etc/letsencrypt'
      - '/var/lib/letsencrypt:/var/lib/letsencrypt'
      - 'certbot_www:/var/www/certbot'
    networks:
      - dev

  backend:
    build:
      context: ./backend
    expose:
      - '5000'
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/data/prod.db
      - FRONTEND_URL=https://nataliagorlach.kz,https://www.nataliagorlach.kz
    volumes:
      - backend_data:/app/data
      - ./backend/images:/app/images
    networks:
      - dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_URL: http://backend:5000
    expose:
      - '3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://backend:5000
    networks:
      - dev
    restart: unless-stopped

volumes:
  # backend_uploads:
  # postgres_data:
  backend_data:
  certbot_www:
